<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Contact | John Doe Portfolio</title>

    <meta
        name="description"
        content="Contact John Doe for projects and collaborations.">

</head>

<body>

    <a href="#main-content">Skip to Main Content</a>

    <header>
        <h1>Contact</h1>

        <nav aria-label="Primary Navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html" aria-current="page">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">

        <section aria-labelledby="contact-heading">

            <h2 id="contact-heading">
                Contact Me
            </h2>

            <form
                action="#"
                method="post"
                aria-label="Contact Form">

                <fieldset>

                    <legend>Your Information</legend>

                    <div>
                        <label for="name">
                            Full Name
                        </label>

                        <input
                            type="text"
                            id="name"
                            name="name"
                            required
                            autocomplete="name">
                    </div>

                    <div>
                        <label for="email">
                            Email Address
                        </label>

                        <input
                            type="email"
                            id="email"
                            name="email"
                            required
                            autocomplete="email">
                    </div>

                    <div>
                        <label for="message">
                            Message
                        </label>

                        <textarea
                            id="message"
                            name="message"
                            rows="6"
                            required></textarea>
                    </div>

                </fieldset>

                <button type="submit">
                    Send Message
                </button>

            </form>

        </section>

    </main>

    <footer>
        <p>&copy; 2026 John Doe</p>
    </footer>

</body>
</html>
